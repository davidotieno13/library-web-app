<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar {
            margin-bottom: 20px;
        }

        .card {
            border-radius: 12px;
        }

        table th {
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">📚 Library System</span>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container">

    <!-- ADD BOOK (ADMIN ONLY) -->
    {% if session["user"] == "admin" %}
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="mb-3">➕ Add New Book</h5>

            <form method="POST" action="/add" class="row g-2">

                <div class="col-md-4">
                    <input name="title" class="form-control" placeholder="Title" required>
                </div>

                <div class="col-md-4">
                    <input name="author" class="form-control" placeholder="Author" required>
                </div>

                <div class="col-md-4">
                    <input name="subject" class="form-control" placeholder="Subject">
                </div>

                <div class="col-md-12 text-end">
                    <button class="btn btn-primary mt-2">Add Book</button>
                </div>

            </form>
        </div>
    </div>
    {% endif %}

    <!-- SEARCH -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <form method="GET" action="/" class="d-flex">

                <input name="search"
                       class="form-control me-2"
                       placeholder="Search by title, author, or subject">

                <button class="btn btn-success">Search</button>
            </form>
        </div>
    </div>

    <!-- BOOK LIST -->
    <div class="card shadow-sm">
        <div class="card-body">

            <h5 class="mb-3">📖 Books List</h5>

            <div class="table-responsive">
                <table class="table table-hover align-middle">

                    <thead class="table-light">
                        <tr>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Subject</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for book in books %}
                        <tr>
                            <td>{{ book[1] }}</td>
                            <td>{{ book[2] }}</td>
                            <td>{{ book[3] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
