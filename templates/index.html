<!DOCTYPE html>
<html>
<head>
    <title>Library System</title>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section {
            margin-top: 20px;
        }

        input {
            padding: 6px;
            margin: 4px;
        }

        button {
            padding: 6px 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background: #f0f0f0;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>📚 Library System</h2>
    <a href="/logout">Logout</a>
</div>

<!-- ADD BOOK (ADMIN ONLY) -->
{% if session["user"] == "admin" %}
<div class="section">
    <h3>Add Book</h3>
    <form method="POST" action="/add">
        <input name="title" placeholder="Title">
        <input name="author" placeholder="Author">
        <input name="subject" placeholder="Subject">
        <button type="submit">Add</button>
    </form>
</div>
{% endif %}

<!-- SEARCH -->
<div class="section">
    <h3>Search</h3>
    <form method="GET" action="/">
        <input name="search" placeholder="Search books...">
        <button type="submit">Search</button>
    </form>
</div>

<!-- TABLE -->
<div class="section">
    <h3>Books List</h3>

    <table>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Subject</th>
        </tr>

        {% for book in books %}
        <tr>
            <td>{{ book[1] }}</td>
            <td>{{ book[2] }}</td>
            <td>{{ book[3] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
