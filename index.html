<!DOCTYPE html>
<html>
<head>
    <title>Library System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2>📚 Library System</h2>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>

<hr>

<!-- ADD -->
{% if session["user"] == "admin" %}
<form method="POST" action="/add" class="row g-2">
    <input class="col" name="title" placeholder="Title">
    <input class="col" name="author" placeholder="Author">
    <input class="col" name="isbn" placeholder="ISBN">
    <input class="col" name="publisher" placeholder="Publisher">
    <input class="col" name="year" placeholder="Year">
    <input class="col" name="edition" placeholder="Edition">
    <input class="col" name="category" placeholder="Category">
    <input class="col" name="copies" placeholder="Copies">
    <input class="col" name="shelf" placeholder="Shelf">

    <button class="btn btn-primary mt-2">Add Book</button>
</form>
{% endif %}

<hr>

<!-- SEARCH -->
<form method="GET">
    <input name="search" class="form-control" placeholder="Search books...">
</form>

<hr>

<!-- TABLE -->
<table class="table table-striped">
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>ISBN</th>
        <th>Category</th>
        <th>Available</th>
        <th>Action</th>
    </tr>

    {% for b in books %}
    <tr>
        <td>{{ b[1] }}</td>
        <td>{{ b[2] }}</td>
        <td>{{ b[3] }}</td>
        <td>{{ b[7] }}</td>
        <td>{{ b[10] }}</td>
        <td><a href="/borrow/{{ b[0] }}" class="btn btn-sm btn-success">Borrow</a></td>
    </tr>
    {% endfor %}
</table>

</div>

</body>
</html>
